<svg fill="none" viewBox="0 0 600 150" width="600" height="150" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
<style>
:root {
  --custom-gradient-color-1: #9e6bff;
  --custom-gradient-color-2: #9fc1ff;
  --custom-gradient-color-3: #9e6bff;/*
  --custom-gradient-color-1: #a9c9ff;
  --custom-gradient-color-2: #ffbbec;
  --custom-gradient-color-3: #ffc3a0;*/
}

/* Page styling */
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
}

/* Base username */
.username {
  position: relative;
  font-size: 2rem;
  font-weight: 500;
  display: inline-block;
}

/* Gradient text */
.usernameGradient {
  background: linear-gradient(
    -30deg,
    var(--custom-gradient-color-1),
    var(--custom-gradient-color-2),
    var(--custom-gradient-color-3)/*,
    var(--custom-gradient-color-1)*/
  );
  background-size: 100px auto;

  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: gradientUsernameAnimation 1.5s linear infinite;
}

/* Glow container */
.glowWrapper {
  position: relative;
  z-index: 0;
}

/* Glow layer */
.glowWrapper::after {
  content: attr(data-text);
  position: absolute;
  inset: 0;

  background: inherit;
  background-clip: text;
  -webkit-background-clip: text;

  -webkit-text-fill-color: transparent;

  filter: blur(6px);
  opacity: 0.7;
  z-index: -1;
}

/* Animation */
@keyframes gradientUsernameAnimation {
  0% {
    background-position: 0;
  }
  100% {
    background-position: 100px;
  }
}
</style>


<div class="username glowWrapper usernameGradient" data-text="Data Science" style="font-family:'Arial';">
  Data Science
</div>
</div>
  </foreignObject>
</svg>
